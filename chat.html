<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat with Gideon AI | Gideon Codeworks</title>
  <meta name="description" content="Chat with our AI assistant to learn about our web design services, pricing, and how we can help your business.">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Professional Dark Theme -->
  <link rel="stylesheet" href="css/professional-dark.css">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: #0f172a;
    }

    .chat-header {
      background: linear-gradient(135deg, #3b82f6, #10b981);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chat-avatar img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .chat-info h1 {
      font-size: 16px;
      font-weight: 600;
      color: white;
      margin: 0;
    }

    .chat-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin: 2px 0 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .call-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .call-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bot {
      justify-content: flex-start;
    }

    .message-user {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .message-avatar img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-bot .message-bubble {
      background: #1e293b;
      color: #f1f5f9;
      border-bottom-left-radius: 4px;
    }

    .message-user .message-bubble {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-bubble strong {
      color: #3b82f6;
    }

    .message-user .message-bubble strong {
      color: white;
    }

    .message-bubble a {
      color: #60a5fa;
      text-decoration: underline;
    }

    .quick-actions {
      padding: 0 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-action-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-action-btn:hover {
      background: #334155;
      border-color: #3b82f6;
    }

    .chat-input-container {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #0f172a;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 12px 18px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .chat-input:focus {
      border-color: #3b82f6;
    }

    .chat-input::placeholder {
      color: #64748b;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <a href="index.html" class="back-btn" aria-label="Go back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <div class="chat-avatar">
          <img src="images/gcw-g-icon.png" alt="G">
        </div>
        <div class="chat-info">
          <h1>Gideon AI Assistant</h1>
          <p><span class="status-dot"></span> Online</p>
        </div>
      </div>
      <a href="tel:+12164632648" class="call-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Call
      </a>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <!-- Messages inserted here -->
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" id="quick-actions">
      <!-- Quick action buttons inserted here -->
    </div>

    <!-- Input -->
    <div class="chat-input-container">
      <input
        type="text"
        class="chat-input"
        id="chat-input"
        placeholder="Type your message..."
        autocomplete="off"
        enterkeyhint="send"
      >
      <button class="send-btn" id="send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    /**
     * Gideon AI - Full Page Chat (Mobile)
     * Conversational chatbot with natural lead capture
     */
    const chat = {
      messagesContainer: document.getElementById('chat-messages'),
      quickActionsContainer: document.getElementById('quick-actions'),
      input: document.getElementById('chat-input'),
      sendBtn: document.getElementById('send-btn'),

      // Conversation state
      stage: 'greeting',
      lead: { name: null, phone: null, email: null, reason: null },
      askedFor: [],
      messageCount: 0,

      // Natural responses
      responses: {
        greetings: [
          "Hey there! 👋 I'm the Gideon AI. What brings you here today?",
          "Hi! 👋 Welcome to Gideon Codeworks. What can I help you with?",
          "Hey! 👋 I'm here to help. Looking for a website or just exploring?"
        ],
        askName: [
          "By the way, what's your name? I'd love to know who I'm chatting with!",
          "I didn't catch your name - what should I call you?",
          "What's your name, by the way?"
        ],
        gotName: [
          "Nice to meet you, {name}! 🙌",
          "Great to meet you, {name}!",
          "Hey {name}! Love it. 👊"
        ],
        askPhone: [
          "What's the best number to reach you at? Our team can give you a quick call.",
          "Got a phone number? We can have someone reach out to chat more.",
          "What's your phone number? We'd love to connect you with our team."
        ],
        askEmail: [
          "And your email? Just so we can send you some info.",
          "What email should we use to follow up?",
          "Drop your email and we'll send you details."
        ],
        askReason: [
          "What kind of project are you thinking about?",
          "Tell me a bit about what you're looking for.",
          "What's on your mind - new website, redesign, something else?"
        ],
        thanks: [
          "Perfect! Our team will reach out within 24 hours. Anything else I can help with?",
          "Awesome, you're all set! Someone will call you soon. Any other questions?",
          "Got it! We'll be in touch. Want to know more about our pricing while you wait?"
        ],
        pricing: `Here's the quick breakdown:

**Monthly Plans** (best value):
• Starter: $497 setup + $212/mo
• Growth: $697 setup + $252/mo ⭐
• Domination: $997 setup + $299/mo

**One-Time Builds**:
• Starter: $2,497
• Growth: $3,497
• Domination: $4,997

Monthly includes hosting, updates, and support. Which sounds right for you?`,

        process: `Super simple:

1️⃣ **Free consultation** - we chat about your business
2️⃣ **We build it** - you send logo/content, we do the rest
3️⃣ **Review together** - quick calls to refine
4️⃣ **Launch!** - usually 2-4 weeks

Want to get started?`,

        services: `We do it all:

🌐 **Websites** - custom, mobile-friendly, fast
🔧 **Hosting & support** - we handle everything
✍️ **Content** - we write or polish your copy
📈 **SEO** - get found on Google
🛒 **E-commerce** - sell products online
📱 **Google Ads** - drive traffic fast

What sounds most relevant to you?`,

        whyUs: `Here's why people choose us:

✅ **We handle everything** - no DIY builders
✅ **Real humans** - call or text us anytime
✅ **Fast** - most sites live in 2-4 weeks
✅ **Affordable** - from $212/month
✅ **Guarantee** - 30-day satisfaction promise

Want to chat with the team?`,

        contact: `Here's how to reach us:

📞 **216-463-2648** (Mon-Fri 9-6 ET)
📧 josh@gideoncode.com

Or I can grab your info and have someone call you - which works better?`
      },

      pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      },

      format(text) {
        return text
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
          .replace(/\n/g, '<br>');
      },

      scrollToBottom() {
        setTimeout(() => {
          this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
        }, 100);
      },

      say(text, delay = 0) {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = 'message message-bot';
          div.innerHTML = `
            <div class="message-avatar"><img src="images/gcw-g-icon.png" alt="G"></div>
            <div class="message-bubble">${this.format(text)}</div>
          `;
          this.messagesContainer.appendChild(div);
          this.scrollToBottom();
        }, delay);
      },

      userSay(text) {
        const div = document.createElement('div');
        div.className = 'message message-user';
        div.innerHTML = `<div class="message-bubble">${text}</div>`;
        this.messagesContainer.appendChild(div);
        this.scrollToBottom();
        this.messageCount++;
      },

      showQuickActions(actions) {
        this.quickActionsContainer.innerHTML = actions.map(a =>
          `<button class="quick-action-btn" data-action="${a.action}">${a.text}</button>`
        ).join('');

        this.quickActionsContainer.querySelectorAll('.quick-action-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            this.userSay(e.target.textContent);
            this.quickActionsContainer.innerHTML = '';
            this.handleAction(e.target.dataset.action);
          });
        });
      },

      handleAction(action) {
        setTimeout(() => {
          switch(action) {
            case 'pricing':
              this.say(this.responses.pricing);
              this.tryCapture();
              break;
            case 'services':
              this.say(this.responses.services);
              this.tryCapture();
              break;
            case 'process':
              this.say(this.responses.process);
              this.tryCapture();
              break;
            case 'whyus':
              this.say(this.responses.whyUs);
              this.tryCapture();
              break;
            case 'contact':
              this.say(this.responses.contact);
              setTimeout(() => this.startCapture(), 1500);
              break;
            case 'yes_call':
              this.startCapture();
              break;
            case 'no_thanks':
              this.say("No problem! Let me know if you have any other questions. 😊");
              this.showQuickActions([
                { text: "💰 Pricing", action: "pricing" },
                { text: "⚡ How it works", action: "process" }
              ]);
              break;
            case 'new_site':
              this.lead.reason = "New website";
              this.say("Awesome! A new website - exciting! " + this.pick(this.responses.askName));
              this.stage = 'capturing';
              this.askedFor.push('name');
              break;
            case 'redesign':
              this.lead.reason = "Redesign";
              this.say("Got it, a redesign! We can definitely help. " + this.pick(this.responses.askName));
              this.stage = 'capturing';
              this.askedFor.push('name');
              break;
          }
        }, 400);
      },

      tryCapture() {
        if (!this.lead.name && !this.lead.phone) {
          setTimeout(() => {
            this.showQuickActions([
              { text: "📞 Have someone call me", action: "yes_call" },
              { text: "Just browsing", action: "no_thanks" }
            ]);
          }, 500);
        } else {
          setTimeout(() => {
            this.showQuickActions([
              { text: "💰 Pricing", action: "pricing" },
              { text: "⚡ Process", action: "process" },
              { text: "🏆 Why us", action: "whyus" }
            ]);
          }, 500);
        }
      },

      startCapture() {
        this.stage = 'capturing';
        if (!this.lead.name) {
          this.say(this.pick(this.responses.askName));
          this.askedFor.push('name');
        } else if (!this.lead.phone) {
          this.say(this.pick(this.responses.askPhone));
          this.askedFor.push('phone');
        } else if (!this.lead.email) {
          this.say(this.pick(this.responses.askEmail));
          this.askedFor.push('email');
        } else {
          this.finishCapture();
        }
      },

      extractInfo(msg) {
        const phoneMatch = msg.match(/(\d{3}[-.\s]?\d{3}[-.\s]?\d{4})/);
        const emailMatch = msg.match(/([^\s@]+@[^\s@]+\.[^\s@]+)/);

        if (phoneMatch && !this.lead.phone) {
          this.lead.phone = phoneMatch[1];
          this.say("Got your number! 📱");
          if (!this.lead.email) {
            setTimeout(() => {
              this.say(this.pick(this.responses.askEmail));
              this.stage = 'capturing';
              this.askedFor.push('email');
            }, 800);
          } else {
            this.finishCapture();
          }
          return true;
        }

        if (emailMatch && !this.lead.email) {
          this.lead.email = emailMatch[1];
          this.say("Got your email! 📧");
          if (!this.lead.phone) {
            setTimeout(() => {
              this.say(this.pick(this.responses.askPhone));
              this.stage = 'capturing';
              this.askedFor.push('phone');
            }, 800);
          } else {
            this.finishCapture();
          }
          return true;
        }

        return false;
      },

      captureInfo(msg) {
        const lastAsked = this.askedFor[this.askedFor.length - 1];

        if (lastAsked === 'name') {
          this.lead.name = msg.split(' ')[0];
          this.say(this.pick(this.responses.gotName).replace('{name}', this.lead.name));
          setTimeout(() => {
            this.say(this.pick(this.responses.askPhone));
            this.askedFor.push('phone');
          }, 800);
        }
        else if (lastAsked === 'phone') {
          const phoneMatch = msg.match(/(\d{3}[-.\s]?\d{3}[-.\s]?\d{4}|\d{10})/);
          if (phoneMatch) {
            this.lead.phone = phoneMatch[1];
            this.say("Perfect! 📱");
            setTimeout(() => {
              this.say(this.pick(this.responses.askEmail));
              this.askedFor.push('email');
            }, 600);
          } else {
            this.say("Hmm, I need a 10-digit phone number. Try again?");
          }
        }
        else if (lastAsked === 'email') {
          const emailMatch = msg.match(/([^\s@]+@[^\s@]+\.[^\s@]+)/);
          if (emailMatch) {
            this.lead.email = emailMatch[1];
            this.say("Got it! 📧");
            setTimeout(() => {
              if (!this.lead.reason) {
                this.say(this.pick(this.responses.askReason));
                this.askedFor.push('reason');
              } else {
                this.finishCapture();
              }
            }, 600);
          } else {
            this.say("That doesn't look like an email. Can you double-check it?");
          }
        }
        else if (lastAsked === 'reason') {
          this.lead.reason = msg;
          this.finishCapture();
        }
      },

      finishCapture() {
        this.stage = 'chatting';
        this.sendLead();
        this.say(this.pick(this.responses.thanks));
        setTimeout(() => {
          this.showQuickActions([
            { text: "💰 See pricing", action: "pricing" },
            { text: "⚡ How it works", action: "process" }
          ]);
        }, 500);
      },

      sendLead() {
        console.log('🎉 Lead captured:', this.lead);
        try {
          fetch('/api/leads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ...this.lead,
              source: 'chatbot-mobile',
              page: window.location.href,
              timestamp: new Date().toISOString()
            })
          }).catch(() => {});
        } catch(e) {}
      },

      process(msg) {
        const m = msg.toLowerCase();

        // If capturing info
        if (this.stage === 'capturing') {
          this.captureInfo(msg);
          return;
        }

        // Check for natural info given
        if (this.extractInfo(msg)) return;

        // Intent matching
        if (m.match(/price|cost|how much|pricing|package|plan/)) {
          this.say(this.responses.pricing);
          this.tryCapture();
        }
        else if (m.match(/service|what do you|offer|help with/)) {
          this.say(this.responses.services);
          this.tryCapture();
        }
        else if (m.match(/process|how does|how do you|work|timeline|long/)) {
          this.say(this.responses.process);
          this.tryCapture();
        }
        else if (m.match(/why|different|better|choose you/)) {
          this.say(this.responses.whyUs);
          this.tryCapture();
        }
        else if (m.match(/contact|call|phone|talk|speak|human|person|email/)) {
          this.say(this.responses.contact);
          setTimeout(() => this.startCapture(), 1500);
        }
        else if (m.match(/hello|hi|hey|howdy|yo|sup/)) {
          if (!this.lead.name) {
            this.say("Hey! 👋 " + this.pick(this.responses.askName));
            this.askedFor.push('name');
            this.stage = 'capturing';
          } else {
            this.say(`Hey ${this.lead.name}! What can I help you with?`);
            this.showQuickActions([
              { text: "💰 Pricing", action: "pricing" },
              { text: "🎨 Services", action: "services" }
            ]);
          }
        }
        else if (m.match(/thank|thanks|thx/)) {
          this.say("You're welcome! 😊 Anything else I can help with?");
        }
        else if (m.match(/website|site|web/)) {
          this.say("Nice! We build custom websites for small businesses. Are you looking for a new site or redesigning an existing one?");
          this.showQuickActions([
            { text: "🆕 New website", action: "new_site" },
            { text: "🔄 Redesign", action: "redesign" }
          ]);
        }
        else if (m.match(/new|start|need a site|build/)) {
          this.lead.reason = "New website";
          this.say("Awesome! A new website - exciting! " + this.pick(this.responses.askName));
          this.stage = 'capturing';
          this.askedFor.push('name');
        }
        else if (m.match(/redesign|redo|update|existing|current/)) {
          this.lead.reason = "Redesign";
          this.say("Got it, a redesign! We can definitely help. " + this.pick(this.responses.askName));
          this.stage = 'capturing';
          this.askedFor.push('name');
        }
        else if (m.match(/ecommerce|e-commerce|shop|store|sell/)) {
          this.lead.reason = "E-commerce";
          this.say("E-commerce, nice! We do Shopify and WooCommerce. " + this.pick(this.responses.askName));
          this.stage = 'capturing';
          this.askedFor.push('name');
        }
        else {
          // Unknown input - maybe it's their name?
          if (msg.split(' ').length <= 3 && !m.match(/[0-9@]/)) {
            this.lead.name = msg.split(' ')[0];
            this.say(this.pick(this.responses.gotName).replace('{name}', this.lead.name) + " What brings you to Gideon Codeworks today?");
            this.showQuickActions([
              { text: "🆕 Need a website", action: "new_site" },
              { text: "🔄 Redesign existing", action: "redesign" },
              { text: "💰 Just checking pricing", action: "pricing" }
            ]);
          } else {
            this.say("I'm here to help! I can tell you about our pricing, services, or connect you with the team. What sounds good?");
            this.showQuickActions([
              { text: "💰 Pricing", action: "pricing" },
              { text: "🎨 Services", action: "services" },
              { text: "📞 Talk to someone", action: "contact" }
            ]);
          }
        }
      },

      send() {
        const msg = this.input.value.trim();
        if (!msg) return;
        this.userSay(msg);
        this.input.value = '';
        this.quickActionsContainer.innerHTML = '';
        setTimeout(() => this.process(msg), 400);
      },

      init() {
        this.sendBtn.addEventListener('click', () => this.send());
        this.input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.send();
        });

        // Welcome message
        setTimeout(() => {
          this.say(this.pick(this.responses.greetings));
          this.showQuickActions([
            { text: "💰 Pricing", action: "pricing" },
            { text: "🎨 Services", action: "services" },
            { text: "📞 Talk to someone", action: "contact" }
          ]);
        }, 500);
      }
    };

    // Start the chat
    chat.init();
  </script>
</body>
</html>
