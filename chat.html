<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat with Gideon AI | Gideon Codeworks</title>
  <meta name="description" content="Chat with our AI assistant to learn about our web design services, pricing, and how we can help your business.">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Professional Dark Theme -->
  <link rel="stylesheet" href="css/professional-dark.css">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: #0f172a;
    }

    .chat-header {
      background: linear-gradient(135deg, #3b82f6, #10b981);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .chat-avatar img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .chat-info h1 {
      font-size: 16px;
      font-weight: 600;
      color: white;
      margin: 0;
    }

    .chat-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin: 2px 0 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .call-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .call-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bot {
      justify-content: flex-start;
    }

    .message-user {
      justify-content: flex-end;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .message-avatar img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message-bot .message-bubble {
      background: #1e293b;
      color: #f1f5f9;
      border-bottom-left-radius: 4px;
    }

    .message-user .message-bubble {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message-bubble strong {
      color: #3b82f6;
    }

    .message-user .message-bubble strong {
      color: white;
    }

    .message-bubble a {
      color: #60a5fa;
      text-decoration: underline;
    }

    .quick-actions {
      padding: 0 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-action-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-action-btn:hover {
      background: #334155;
      border-color: #3b82f6;
    }

    .chat-input-container {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #0f172a;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 12px 18px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .chat-input:focus {
      border-color: #3b82f6;
    }

    .chat-input::placeholder {
      color: #64748b;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-page">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <a href="index.html" class="back-btn" aria-label="Go back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </a>
        <div class="chat-avatar">
          <img src="images/gcw-g-icon.png" alt="G">
        </div>
        <div class="chat-info">
          <h1>Gideon AI Assistant</h1>
          <p><span class="status-dot"></span> Online</p>
        </div>
      </div>
      <a href="tel:+12164632648" class="call-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Call
      </a>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chat-messages">
      <!-- Messages inserted here -->
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" id="quick-actions">
      <!-- Quick action buttons inserted here -->
    </div>

    <!-- Input -->
    <div class="chat-input-container">
      <input
        type="text"
        class="chat-input"
        id="chat-input"
        placeholder="Type your message..."
        autocomplete="off"
        enterkeyhint="send"
      >
      <button class="send-btn" id="send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <style>
    .typing-indicator .message-bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      background: #64748b;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>

  <script>
    /**
     * Gideon AI - Full Page Chat (Mobile)
     * REAL AI powered by Claude/GPT
     */
    const chat = {
      messagesContainer: document.getElementById('chat-messages'),
      quickActionsContainer: document.getElementById('quick-actions'),
      input: document.getElementById('chat-input'),
      sendBtn: document.getElementById('send-btn'),

      history: [],
      lead: { name: null, phone: null, email: null },
      isTyping: false,

      format(text) {
        return text
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
      },

      scrollToBottom() {
        setTimeout(() => {
          this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
        }, 100);
      },

      say(text) {
        const div = document.createElement('div');
        div.className = 'message message-bot';
        div.innerHTML = `
          <div class="message-avatar"><img src="images/gcw-g-icon.png" alt="G"></div>
          <div class="message-bubble">${this.format(text)}</div>
        `;
        this.messagesContainer.appendChild(div);
        this.scrollToBottom();
        this.history.push({ role: 'assistant', content: text });
      },

      userSay(text) {
        const div = document.createElement('div');
        div.className = 'message message-user';
        div.innerHTML = `<div class="message-bubble">${text}</div>`;
        this.messagesContainer.appendChild(div);
        this.scrollToBottom();
        this.history.push({ role: 'user', content: text });
        this.extractInfo(text);
      },

      showTyping() {
        const div = document.createElement('div');
        div.className = 'message message-bot typing-indicator';
        div.id = 'typing-indicator';
        div.innerHTML = `
          <div class="message-avatar"><img src="images/gcw-g-icon.png" alt="G"></div>
          <div class="message-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        `;
        this.messagesContainer.appendChild(div);
        this.scrollToBottom();
      },

      hideTyping() {
        const t = document.getElementById('typing-indicator');
        if (t) t.remove();
      },

      showQuickActions(actions) {
        this.quickActionsContainer.innerHTML = actions.map(a =>
          `<button class="quick-action-btn" data-action="${a.action}">${a.text}</button>`
        ).join('');

        this.quickActionsContainer.querySelectorAll('.quick-action-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const text = e.target.textContent;
            const action = e.target.dataset.action;
            this.userSay(text);
            this.quickActionsContainer.innerHTML = '';
            this.handleAction(action, text);
          });
        });
      },

      async handleAction(action, text) {
        const prompts = {
          pricing: "Tell me about your pricing and packages",
          website: "I need a new website for my business",
          exploring: "I'm just exploring my options right now",
          contact: "I'd like to talk to someone on your team",
          services: "What services do you offer?"
        };
        await this.getAIResponse(prompts[action] || text);
      },

      async send() {
        const msg = this.input.value.trim();
        if (!msg || this.isTyping) return;

        this.userSay(msg);
        this.input.value = '';
        this.quickActionsContainer.innerHTML = '';

        await this.getAIResponse(msg);
      },

      async getAIResponse(userMessage) {
        this.isTyping = true;
        this.showTyping();

        const context = this.history.slice(-10).map(m => `${m.role}: ${m.content}`).join('\n');
        const leadInfo = this.lead.name ? `\nVisitor name: ${this.lead.name}` : '';

        try {
          const response = await fetch('/api/ai-gateway', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              kind: 'concierge',
              payload: {
                context: context + leadInfo,
                question: userMessage
              }
            })
          });

          this.hideTyping();
          this.isTyping = false;

          if (!response.ok) throw new Error('API error');

          const data = await response.json();
          this.say(data.message || "Having trouble connecting. Call us at 216-463-2648!");

          if (data.needsBooking) {
            this.showQuickActions([
              { text: "📞 Call 216-463-2648", action: "call" },
              { text: "📅 Schedule a call", action: "schedule" }
            ]);
          } else {
            this.showContextualActions(userMessage);
          }

        } catch (error) {
          console.error('Chat error:', error);
          this.hideTyping();
          this.isTyping = false;

          this.say("I'm having a moment 😅 Reach our team at **216-463-2648** or **josh@gideoncode.com**!");
          this.showQuickActions([
            { text: "📞 Call now", action: "call" },
            { text: "💰 Pricing", action: "pricing" }
          ]);
        }
      },

      showContextualActions(lastMessage) {
        const m = lastMessage.toLowerCase();
        if (m.includes('price') || m.includes('cost')) {
          this.showQuickActions([
            { text: "📞 Talk to sales", action: "contact" },
            { text: "🚀 Get started", action: "website" }
          ]);
        } else if (m.includes('website') || m.includes('site')) {
          this.showQuickActions([
            { text: "💰 See pricing", action: "pricing" },
            { text: "📞 Talk to someone", action: "contact" }
          ]);
        } else {
          this.showQuickActions([
            { text: "💰 Pricing", action: "pricing" },
            { text: "🎨 Services", action: "services" },
            { text: "📞 Contact", action: "contact" }
          ]);
        }
      },

      extractInfo(msg) {
        const phoneMatch = msg.match(/(\d{3}[-.\s]?\d{3}[-.\s]?\d{4})/);
        if (phoneMatch) this.lead.phone = phoneMatch[1];

        const emailMatch = msg.match(/([^\s@]+@[^\s@]+\.[^\s@]+)/);
        if (emailMatch) this.lead.email = emailMatch[1];

        const nameMatch = msg.match(/(?:i'm|im|i am|my name is|call me|this is) ([a-z]+)/i);
        if (nameMatch) this.lead.name = nameMatch[1].charAt(0).toUpperCase() + nameMatch[1].slice(1);

        if (this.lead.phone || this.lead.email) {
          this.sendLead();
        }
      },

      sendLead() {
        try {
          fetch('/api/leads', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ...this.lead,
              source: 'chatbot-mobile-ai',
              page: window.location.href,
              conversation: this.history.slice(-6),
              timestamp: new Date().toISOString()
            })
          }).catch(() => {});
        } catch(e) {}
      },

      init() {
        this.sendBtn.addEventListener('click', () => this.send());
        this.input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') this.send();
        });

        // Welcome
        setTimeout(() => {
          this.say("Hey there! 👋 I'm Gideon, your AI concierge. I can help you figure out exactly what you need - whether it's a new website, app, or just exploring. What brings you here?");
          this.showQuickActions([
            { text: "💰 Pricing info", action: "pricing" },
            { text: "🚀 I need a website", action: "website" },
            { text: "💬 Just exploring", action: "exploring" }
          ]);
        }, 500);
      }
    };

    chat.init();
  </script>
</body>
</html>
